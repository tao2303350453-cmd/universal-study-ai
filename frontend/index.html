<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Study AI - 智能全科助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .sidebar-transition { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .chat-bubble { max-width: 80%; border-radius: 1.5rem; }
    </style>
</head>
<body class="bg-gray-50 h-screen flex overflow-hidden">

    <aside id="sidebar" class="sidebar-transition w-64 bg-slate-900 text-white flex-shrink-0 flex flex-col">
        <div class="p-6 text-xl font-bold border-b border-slate-800 flex items-center gap-2">
            <i class="fas fa-graduation-cap text-blue-400"></i>
            <span>学习助手 Pro</span>
        </div>
        
        <nav class="flex-1 overflow-y-auto p-4 space-y-2" id="subjectList">
            <p class="text-xs text-gray-500 uppercase tracking-wider mb-2 px-2">我的学科</p>
            <div class="animate-pulse flex space-y-3 flex-col">
                <div class="h-10 bg-slate-800 rounded"></div>
                <div class="h-10 bg-slate-800 rounded"></div>
            </div>
        </nav>

        <div class="p-4 border-t border-slate-800">
            <button onclick="addNewSubject()" class="w-full flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 py-2 rounded-lg transition">
                <i class="fas fa-plus"></i> 添加新学科
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 bg-white">
        <header class="h-16 border-b flex items-center justify-between px-8 bg-white shadow-sm z-10">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="text-gray-500 hover:text-gray-700">
                    <i class="fas fa-bars text-xl"></i>
                </button>
                <h2 id="currentSubjectName" class="text-lg font-semibold text-gray-800">请选择学科</h2>
            </div>
            <div class="flex items-center gap-3">
                <span class="flex items-center gap-1 text-xs text-green-500 bg-green-50 px-2 py-1 rounded-full">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-ping"></span>
                    后端已连接
                </span>
            </div>
        </header>

        <div id="chatContainer" class="flex-1 overflow-y-auto p-6 space-y-4 bg-gray-50">
            <div class="flex justify-center">
                <p class="text-sm text-gray-400 bg-white px-4 py-1 rounded-full shadow-sm">请从左侧选择一个学科开始学习</p>
            </div>
        </div>

        <footer class="p-4 bg-white border-t">
            <div class="max-w-4xl mx-auto flex gap-4">
                <div class="flex-1 relative">
                    <input type="text" id="userInput" placeholder="输入你的问题..." 
                           class="w-full border border-gray-200 rounded-2xl px-6 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                </div>
                <button onclick="sendMessage()" class="bg-blue-600 text-white px-6 py-3 rounded-2xl hover:bg-blue-700 transition flex items-center gap-2">
                    <span class="hidden md:inline">发送</span>
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </footer>
    </main>

    <script>
        let currentSubjectId = null;
        const API_BASE = "https://universal-study-ai-myb8.vercel.app/api";

        // 1. 初始化：获取学科列表
        async function fetchSubjects() {
            try {
                const res = await fetch(`${API_BASE}/subjects`);
                const subjects = await res.json();
                const list = document.getElementById('subjectList');
                list.innerHTML = '<p class="text-xs text-gray-500 uppercase tracking-wider mb-2 px-2">我的学科</p>';
                
                subjects.forEach(sub => {
                    const btn = document.createElement('button');
                    btn.className = "w-full flex items-center gap-3 px-4 py-3 rounded-xl transition text-left text-gray-300 hover:bg-slate-800 hover:text-white group";
                    btn.onclick = () => selectSubject(sub);
                    btn.innerHTML = `
                        <i class="fas fa-book-bookmark text-gray-500 group-hover:text-blue-400"></i>
                        <span class="truncate">${sub.name}</span>
                    `;
                    list.appendChild(btn);
                });
            } catch (err) {
                console.error("加载学科失败", err);
            }
        }

        // 2. 选择学科
        function selectSubject(sub) {
            currentSubjectId = sub.id;
            document.getElementById('currentSubjectName').innerText = sub.name;
            document.getElementById('chatContainer').innerHTML = `
                <div class="flex justify-center">
                    <p class="text-sm text-gray-400">已切换到 [${sub.name}] 知识库，你可以开始提问了。</p>
                </div>
            `;
        }

        // 3. 发送消息
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const msg = input.value.trim();
            if (!msg || !currentSubjectId) return;

            // 添加用户气泡
            appendBubble('user', msg);
            input.value = '';

            try {
                const res = await fetch(`${API_BASE}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg, subject_id: currentSubjectId })
                });
                const data = await res.json();
                appendBubble('ai', data.answer);
            } catch (err) {
                appendBubble('ai', "抱歉，出错了。");
            }
        }

        function appendBubble(role, text) {
            const container = document.getElementById('chatContainer');
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            div.innerHTML = `
                <div class="chat-bubble px-6 py-3 shadow-sm ${role === 'user' ? 'bg-blue-600 text-white' : 'bg-white text-gray-800'}">
                    ${text}
                </div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            sb.classList.toggle('w-0');
            sb.classList.toggle('opacity-0');
        }

        // 启动
        fetchSubjects();
    </script>
</body>
</html>
