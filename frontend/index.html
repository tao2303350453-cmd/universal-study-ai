<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI 学科助手 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 h-screen flex overflow-hidden">
    <aside class="w-72 bg-slate-900 text-white flex flex-col shadow-2xl">
        <div class="p-6 border-b border-slate-800 font-bold text-xl flex items-center gap-2">
            <i class="fas fa-graduation-cap text-blue-400"></i> 我的学科中心
        </div>
        <nav id="categoryTree" class="flex-1 overflow-y-auto p-4 space-y-2"></nav>
        <div class="p-4">
            <button onclick="addCategory()" class="w-full py-3 bg-blue-600 hover:bg-blue-500 rounded-xl font-bold transition">
                + 添加新学科
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col bg-white">
        <header class="h-16 border-b flex items-center justify-between px-8 bg-slate-50/50">
            <div id="statusText" class="font-bold text-slate-700 underline decoration-blue-500">请先在左侧选择学科...</div>
            <div id="uploadBox" class="hidden">
                <input type="file" id="fileIn" class="hidden" onchange="upload(this)">
                <button onclick="document.getElementById('fileIn').click()" class="bg-emerald-500 text-white px-4 py-2 rounded-lg text-sm font-bold">
                    上传资料
                </button>
            </div>
        </header>
        <div id="chatArea" class="flex-1 overflow-y-auto p-6 space-y-4"></div>
        <div class="p-4 border-t flex gap-2">
            <input type="text" id="userInput" class="flex-1 border rounded-xl px-4 py-2" placeholder="选中具体学科后即可提问...">
            <button onclick="send()" class="bg-blue-600 text-white px-8 py-2 rounded-xl font-bold">发送</button>
        </div>
    </main>

    <script>
        let curId = null;
        let allData = [];

        async function refresh() {
            const res = await fetch('/api/categories');
            allData = await res.json();
            const tree = document.getElementById('categoryTree');
            tree.innerHTML = '';
            // 先渲染一级目录
            allData.filter(c => !c.parent_id).forEach(root => {
                const div = document.createElement('div');
                div.innerHTML = `
                    <div class="p-3 hover:bg-slate-800 rounded-xl cursor-pointer font-bold ${curId === root.id ? 'bg-slate-800 text-blue-400' : ''}" 
                         onclick="select('${root.id}', '${root.name}')">
                        <i class="fas fa-folder mr-2"></i> ${root.name}
                    </div>
                    <div id="sub-${root.id}" class="ml-6 mt-1 space-y-1"></div>
                `;
                tree.appendChild(div);
                // 渲染子目录
                allData.filter(c => c.parent_id === root.id).forEach(sub => {
                    const subDiv = document.createElement('div');
                    subDiv.className = `p-2 text-sm hover:text-white cursor-pointer ${curId === sub.id ? 'text-blue-400' : 'text-slate-400'}`;
                    subDiv.innerHTML = `<i class="fas fa-file-alt mr-2"></i> ${sub.name}`;
                    subDiv.onclick = (e) => { e.stopPropagation(); select(sub.id, sub.name); };
                    div.querySelector(`#sub-${root.id}`).appendChild(subDiv);
                });
            });
        }

        function select(id, name) {
            curId = id;
            document.getElementById('statusText').innerText = "当前位置：" + name;
            document.getElementById('uploadBox').classList.remove('hidden');
            refresh();
        }

        async function addCategory() {
            const name = prompt("请输入学科或学期名称：");
            if(!name) return;
            // 如果点选了某个一级学科，再点添加，就加成子分类
            await fetch('/api/categories', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name, parent_id: curId })
            });
            refresh();
        }

        async function upload(el) {
            const fd = new FormData();
            fd.append('file', el.files[0]);
            fd.append('category_id', curId);
            msg('ai', "正在读取资料，请稍等...");
            await fetch('/api/upload', { method: 'POST', body: fd });
            msg('ai', "✅ 学习完毕！可以开始提问。");
        }

        async function send() {
            const val = document.getElementById('userInput').value;
            if(!val || !curId) return alert("请先选择左侧的一个具体学科！");
            msg('user', val);
            document.getElementById('userInput').value = '';
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: val, category_id: curId })
            });
            const data = await res.json();
            msg('ai', data.answer);
        }

        function msg(role, text) {
            const div = document.createElement('div');
            div.className = `p-4 rounded-2xl max-w-[80%] ${role === 'user' ? 'bg-blue-600 text-white ml-auto' : 'bg-slate-100 text-slate-800'}`;
            div.innerText = text;
            document.getElementById('chatArea').appendChild(div);
            document.getElementById('chatArea').scrollTop = 100000;
        }

        refresh();
    </script>
</body>
</html>
