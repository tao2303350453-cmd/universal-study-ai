<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 学科助手 Pro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0f172a;
      --bg2: #1e293b;
      --bg3: #334155;
      --text: #f1f5f9;
      --text2: #94a3b8;
      --accent: #3b82f6;
      --accent2: #60a5fa;
      --green: #22c55e;
      --red: #ef4444;
      --border: #334155;
      --sidebar-w: 320px;
    }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); }
    
    /* Layout */
    .app { display: flex; height: 100vh; overflow: hidden; }
    .sidebar { width: var(--sidebar-w); min-width: var(--sidebar-w); background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    
    /* Header */
    .header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
    .header h1 { font-size: 18px; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .header .subtitle { font-size: 12px; color: var(--text2); }
    
    /* Sidebar search */
    .sidebar-search { padding: 12px; border-bottom: 1px solid var(--border); }
    .sidebar-search input { width: 100%; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 13px; outline: none; }
    .sidebar-search input:focus { border-color: var(--accent); }
    
    /* Tree */
    .tree-container { flex: 1; overflow-y: auto; padding: 8px; }
    .tree-container::-webkit-scrollbar { width: 4px; }
    .tree-container::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 2px; }
    
    .tree-node { cursor: pointer; user-select: none; }
    .tree-item { display: flex; align-items: center; padding: 6px 8px; border-radius: 6px; gap: 6px; transition: all 0.15s; font-size: 13px; }
    .tree-item:hover { background: var(--bg3); }
    .tree-item.active { background: var(--accent); color: white; }
    .tree-item .icon { font-size: 14px; width: 18px; text-align: center; flex-shrink: 0; }
    .tree-item .chevron { font-size: 10px; width: 16px; text-align: center; transition: transform 0.2s; flex-shrink: 0; opacity: 0.5; }
    .tree-item .chevron.open { transform: rotate(90deg); }
    .tree-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tree-item .type-badge { font-size: 10px; padding: 1px 6px; border-radius: 4px; background: var(--bg3); color: var(--text2); flex-shrink: 0; }
    .tree-item .del-btn { opacity: 0; font-size: 12px; padding: 2px 4px; border-radius: 4px; border: none; background: transparent; color: var(--red); cursor: pointer; transition: opacity 0.15s; flex-shrink: 0; }
    .tree-item:hover .del-btn { opacity: 0.6; }
    .tree-item .del-btn:hover { opacity: 1; background: rgba(239,68,68,0.15); }
    
    .children { padding-left: 20px; }
    
    /* Toolbar */
    .toolbar { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .toolbar button { padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg3); color: var(--text); font-size: 13px; cursor: pointer; transition: all 0.15s; }
    .toolbar button:hover { background: var(--accent); border-color: var(--accent); }
    .toolbar button.primary { background: var(--accent); border-color: var(--accent); }
    .toolbar button.primary:hover { background: var(--accent2); }
    
    /* Content area */
    .content { flex: 1; overflow-y: auto; padding: 20px; }
    .content::-webkit-scrollbar { width: 6px; }
    .content::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }
    
    /* Empty state */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }
    .empty-state .big-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
    .empty-state h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
    .empty-state p { font-size: 14px; max-width: 400px; margin: 0 auto; line-height: 1.6; }
    
    /* Cards */
    .card { background: var(--bg2); border-radius: 12px; border: 1px solid var(--border); padding: 20px; margin-bottom: 16px; }
    .card h3 { font-size: 15px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .card .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .card .info-row:last-child { border-bottom: none; }
    .card .info-row .label { color: var(--text2); }
    
    /* Docs list */
    .doc-list { list-style: none; }
    .doc-list li { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 8px; }
    .doc-list li .doc-icon { font-size: 18px; margin-right: 10px; }
    .doc-list li .doc-info { flex: 1; }
    .doc-list li .doc-name { font-size: 13px; font-weight: 500; }
    .doc-list li .doc-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
    .doc-list li button { padding: 4px 10px; border-radius: 6px; border: 1px solid var(--red); background: transparent; color: var(--red); font-size: 12px; cursor: pointer; }
    .doc-list li button:hover { background: rgba(239,68,68,0.15); }
    
    /* Upload */
    .upload-zone { border: 2px dashed var(--border); border-radius: 12px; padding: 30px; text-align: center; cursor: pointer; transition: all 0.2s; margin-bottom: 16px; }
    .upload-zone:hover { border-color: var(--accent); background: rgba(59,130,246,0.05); }
    .upload-zone.dragover { border-color: var(--accent); background: rgba(59,130,246,0.1); }
    .upload-zone .upload-icon { font-size: 32px; margin-bottom: 8px; opacity: 0.5; }
    .upload-zone p { font-size: 13px; color: var(--text2); }
    
    /* Chat */
    .chat-area { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 20px; gap: 16px; }
    .chat-area::-webkit-scrollbar { width: 6px; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }
    
    .message { max-width: 80%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; }
    .message.user { align-self: flex-end; background: var(--accent); color: white; }
    .message.assistant { align-self: flex-start; background: var(--bg2); border: 1px solid var(--border); }
    .message .sources { font-size: 11px; color: var(--text2); margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
    .message .source-tag { display: inline-block; padding: 1px 6px; border-radius: 4px; background: var(--bg3); margin: 2px; font-size: 11px; }
    .message.loading::after { content: '...'; animation: dots 1.5s steps(4) infinite; }
    @keyframes dots { 0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; } }
    
    .chat-input { display: flex; gap: 8px; padding: 12px 20px; border-top: 1px solid var(--border); background: var(--bg2); }
    .chat-input textarea { flex: 1; padding: 10px 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 13px; resize: none; outline: none; min-height: 42px; max-height: 120px; }
    .chat-input textarea:focus { border-color: var(--accent); }
    .chat-input button { padding: 10px 20px; border-radius: 10px; border: none; background: var(--accent); color: white; font-size: 13px; cursor: pointer; white-space: nowrap; }
    .chat-input button:hover { background: var(--accent2); }
    .chat-input button:disabled { opacity: 0.5; cursor: not-allowed; }
    
    /* Modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; }
    .modal-overlay.show { display: flex; }
    .modal { background: var(--bg2); border-radius: 16px; border: 1px solid var(--border); padding: 24px; width: 400px; max-width: 90vw; }
    .modal h2 { font-size: 16px; margin-bottom: 16px; }
    .modal .field { margin-bottom: 14px; }
    .modal .field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 4px; }
    .modal .field input, .modal .field select, .modal .field textarea { width: 100%; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 13px; outline: none; }
    .modal .field input:focus, .modal .field select:focus, .modal .field textarea:focus { border-color: var(--accent); }
    .modal .field textarea { resize: vertical; min-height: 60px; }
    .modal .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
    .modal .actions button { padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg3); color: var(--text); font-size: 13px; cursor: pointer; }
    .modal .actions button.primary { background: var(--accent); border-color: var(--accent); }
    .modal .actions button.primary:hover { background: var(--accent2); }
    
    /* Progress */
    .upload-progress { display: none; margin: 10px 0; }
    .upload-progress.show { display: block; }
    .progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .progress-bar .fill { height: 100%; background: var(--accent); width: 0; transition: width 0.3s; }
    .upload-progress .status-text { font-size: 12px; color: var(--text2); margin-top: 4px; }
    
    /* Toast */
    .toast { position: fixed; bottom: 20px; right: 20px; padding: 12px 20px; border-radius: 10px; background: var(--bg2); border: 1px solid var(--border); font-size: 13px; z-index: 2000; transform: translateY(100px); opacity: 0; transition: all 0.3s; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: var(--green); }
    .toast.error { border-color: var(--red); }

    /* Responsive */
    @media (max-width: 768px) {
      .app { flex-direction: column; }
      .sidebar { width: 100%; min-width: auto; height: 250px; border-right: none; border-bottom: 1px solid var(--border); }
      .message { max-width: 95%; }
    }
  </style>
</head>
<body>
<div id="app"></div>

<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h2 id="modalTitle">新建分组</h2>
    <div class="field">
      <label>名称</label>
      <input type="text" id="modalName" placeholder="输入名称..." />
    </div>
    <div class="field">
      <label>类型</label>
      <select id="modalType">
        <option value="category">子分类</option>
        <option value="course">课程</option>
      </select>
    </div>
    <div class="field">
      <label>描述（可选）</label>
      <textarea id="modalDesc" placeholder="简要说明..."></textarea>
    </div>
    <div class="actions">
      <button onclick="closeModal()">取消</button>
      <button class="primary" onclick="confirmAddNode()">创建</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── State ───
const state = {
  tree: [],
  selectedNode: null,
  selectedNodeChildren: [],
  documents: [],
  chatMessages: [],
  isUploading: false,
  isAsking: false,
};

// ─── API ───
const API = '/api';

async function api(method, path, body, isForm = true) {
  const opts = { method };
  if (body) {
    opts.body = isForm ? body : JSON.stringify(body);
    if (!isForm) opts.headers = { 'Content-Type': 'application/json' };
  }
  const res = await fetch(API + path, opts);
  if (!res.ok) {
    const text = await res.text();
    throw new Error(text.substring(0, 200));
  }
  return res.json();
}

// ─── Tree ───
async function loadTree() {
  try {
    const data = await api('GET', '/nodes/tree');
    state.tree = data.nodes || [];
    renderTree();
  } catch(e) {
    showToast('加载目录失败: ' + e.message, 'error');
  }
}

function renderTree() {
  const container = document.getElementById('treeContainer');
  if (!state.tree.length) {
    container.innerHTML = '<div class="empty-state" style="padding:40px 20px"><p style="font-size:13px;color:var(--text2)">还没有学科目录<br>点上方"新建"开始</p></div>';
    return;
  }
  container.innerHTML = '<div class="tree-container-inner">' + state.tree.map(n => renderNode(n, 0)).join('') + '</div>';
}

function renderNode(node, depth) {
  const hasChildren = node.children && node.children.length > 0;
  const isSelected = state.selectedNode && state.selectedNode.id === node.id;
  const isOpen = isSelected || hasOpenChild(node);
  
  const badges = { 'category': '学科', 'subcategory': '分类', 'course': '课程' };
  
  return `<div class="tree-node" data-id="${node.id}">
    <div class="tree-item ${isSelected ? 'active' : ''}" onclick="selectNode('${node.id}')">
      <span class="chevron ${isOpen ? 'open' : ''}" onclick="event.stopPropagation(); toggleNode('${node.id}')">▶</span>
      <span class="icon">${node.node_type === 'course' ? '📖' : node.node_type === 'category' ? '📁' : '📂'}</span>
      <span class="name">${escapeHtml(node.name)}</span>
      <span class="type-badge">${badges[node.node_type] || node.node_type}</span>
      <button class="del-btn" onclick="event.stopPropagation(); deleteNode('${node.id}','${escapeHtml(node.name)}')">✕</button>
    </div>
    ${hasChildren ? `<div class="children" style="display:${isOpen ? 'block' : 'none'}">` + node.children.map(c => renderNode(c, depth+1)).join('') + '</div>' : ''}
  </div>`;
}

function hasOpenChild(node) {
  if (!node.children) return false;
  return node.children.some(c => (state.selectedNode && state.selectedNode.id === c.id) || hasOpenChild(c));
}

function toggleNode(id) {
  const el = document.querySelector(`.tree-node[data-id="${id}"] .children`);
  const chev = document.querySelector(`.tree-node[data-id="${id}"] .chevron`);
  if (el) {
    el.style.display = el.style.display === 'none' ? 'block' : 'none';
    if (chev) chev.classList.toggle('open');
  }
}

async function selectNode(id) {
  // Find node in tree
  function findNode(nodes, id) {
    for (const n of nodes) {
      if (n.id === id) return n;
      if (n.children) {
        const found = findNode(n.children, id);
        if (found) return found;
      }
    }
    return null;
  }
  
  const node = findNode(state.tree, id);
  if (!node) return;
  
  state.selectedNode = node;
  renderTree();
  
  // Show node info
  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="card">
      <h3>${node.node_type === 'course' ? '📖' : node.node_type === 'category' ? '📁' : '📂'} ${escapeHtml(node.name)}</h3>
      ${node.description ? `<p style="font-size:13px;color:var(--text2);margin-bottom:8px">${escapeHtml(node.description)}</p>` : ''}
    </div>
    
    <div class="card" id="docSection">
      <h3>📄 已上传资料</h3>
      <div id="docList"><p style="font-size:13px;color:var(--text2)">加载中...</p></div>
    </div>
    
    <div class="upload-zone" id="uploadZone" ondrop="handleDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)">
      <div class="upload-icon">📤</div>
      <p>点击或拖拽 PDF/文本文件到此处</p>
      <p style="font-size:11px;margin-top:4px">支持 .pdf .txt 格式</p>
      <input type="file" id="fileInput" accept=".pdf,.txt" style="display:none" onchange="handleFileSelect(event)" />
    </div>
    <div class="upload-progress" id="uploadProgress">
      <div class="progress-bar"><div class="fill" id="progressFill"></div></div>
      <div class="status-text" id="progressText">上传中...</div>
    </div>
    
    <div class="card" style="margin-top:16px">
      <h3>💬 智能问答</h3>
      <p style="font-size:12px;color:var(--text2);margin-bottom:12px">
        提问时将使用该层级及所有子层级的资料作为背景知识
      </p>
      <div id="chatMessages" class="chat-area" style="max-height:400px;padding:0;overflow-y:auto"></div>
      <div class="chat-input" style="padding:8px 0;border-top:none">
        <textarea id="chatInput" rows="2" placeholder="输入问题，按 Enter 发送..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}"></textarea>
        <button id="sendBtn" onclick="sendChat()">发送</button>
      </div>
    </div>
  `;
  
  // Connect upload zone click
  document.getElementById('uploadZone').addEventListener('click', () => {
    document.getElementById('fileInput').click();
  });
  
  // Load documents
  loadDocuments(id);
  
  // Reset chat
  state.chatMessages = [];
  renderChat();
}

async function loadDocuments(nodeId) {
  try {
    const data = await api('GET', `/documents?node_id=${nodeId}`);
    state.documents = data.documents || [];
    renderDocuments();
  } catch(e) {
    document.getElementById('docList').innerHTML = `<p style="font-size:13px;color:var(--red)">加载失败</p>`;
  }
}

function renderDocuments() {
  const el = document.getElementById('docList');
  if (!el) return;
  if (!state.documents.length) {
    el.innerHTML = '<p style="font-size:13px;color:var(--text2)">暂无资料，请上传</p>';
    return;
  }
  el.innerHTML = '<ul class="doc-list">' + state.documents.map(d => `
    <li>
      <span class="doc-icon">📄</span>
      <div class="doc-info">
        <div class="doc-name">${escapeHtml(d.filename || 'unnamed')}</div>
        <div class="doc-meta">${d.created_at ? new Date(d.created_at).toLocaleString() : ''}</div>
      </div>
      <button onclick="deleteDoc('${escapeHtml(d.filename)}')">删除</button>
    </li>
  `).join('') + '</ul>';
}

async function deleteDoc(filename) {
  if (!confirm(`删除 "${filename}"？`)) return;
  try {
    await api('DELETE', `/documents/${encodeURIComponent(filename)}`);
    showToast('已删除', 'success');
    if (state.selectedNode) loadDocuments(state.selectedNode.id);
  } catch(e) {
    showToast('删除失败: ' + e.message, 'error');
  }
}

// ─── Upload ───
function handleDragOver(e) { e.preventDefault(); document.getElementById('uploadZone').classList.add('dragover'); }
function handleDragLeave(e) { document.getElementById('uploadZone').classList.remove('dragover'); }
function handleDrop(e) {
  e.preventDefault();
  document.getElementById('uploadZone').classList.remove('dragover');
  const files = e.dataTransfer.files;
  if (files.length) uploadFile(files[0]);
}
function handleFileSelect(e) {
  const files = e.target.files;
  if (files.length) uploadFile(files[0]);
  e.target.value = '';
}

async function uploadFile(file) {
  if (!state.selectedNode) return showToast('请先选择一个节点', 'error');
  if (state.isUploading) return;
  
  state.isUploading = true;
  const progress = document.getElementById('uploadProgress');
  const fill = document.getElementById('progressFill');
  const text = document.getElementById('progressText');
  progress.classList.add('show');
  fill.style.width = '30%';
  text.textContent = `正在处理 ${file.name}...`;
  
  try {
    const form = new FormData();
    form.append('node_id', state.selectedNode.id);
    form.append('file', file);
    
    fill.style.width = '60%';
    const result = await api('POST', '/documents/upload', form, true);
    
    fill.style.width = '100%';
    text.textContent = `完成！切片 ${result.chunks || 0} 段，存储 ${result.stored || 0} 段`;
    
    showToast('上传成功！' + (result.stored ? `已存储 ${result.stored} 段知识` : ''), 'success');
    setTimeout(() => progress.classList.remove('show'), 2000);
    
    if (state.selectedNode) loadDocuments(state.selectedNode.id);
  } catch(e) {
    fill.style.width = '0';
    text.textContent = '上传失败: ' + e.message;
    showToast('上传失败: ' + e.message, 'error');
  }
  
  state.isUploading = false;
}

// ─── Chat ───
async function sendChat() {
  const input = document.getElementById('chatInput');
  const question = input.value.trim();
  if (!question || !state.selectedNode) return;
  
  state.chatMessages.push({ role: 'user', content: question });
  renderChat();
  input.value = '';
  
  const sendBtn = document.getElementById('sendBtn');
  sendBtn.disabled = true;
  state.isAsking = true;
  
  // Loading message
  state.chatMessages.push({ role: 'assistant', content: '', loading: true });
  renderChat();
  
  try {
    const form = new FormData();
    form.append('node_id', state.selectedNode.id);
    form.append('question', question);
    form.append('include_subnodes', 'true');
    
    const result = await api('POST', '/chat', form, true);
    
    // Replace loading message
    state.chatMessages.pop();
    state.chatMessages.push({
      role: 'assistant',
      content: result.answer || '抱歉，无法获取回答',
      sources: result.sources || [],
    });
    renderChat();
  } catch(e) {
    state.chatMessages.pop();
    state.chatMessages.push({
      role: 'assistant',
      content: '出错了: ' + e.message,
    });
    renderChat();
  }
  
  state.isAsking = false;
  sendBtn.disabled = false;
}

function renderChat() {
  const el = document.getElementById('chatMessages');
  if (!el) return;
  
  if (!state.chatMessages.length) {
    el.innerHTML = '<div class="empty-state" style="padding:30px"><p style="font-size:13px;color:var(--text2)">提出问题，AI 会基于该层级的资料回答</p></div>';
    return;
  }
  
  el.innerHTML = state.chatMessages.map(m => {
    if (m.role === 'user') {
      return `<div class="message user">${escapeHtml(m.content)}</div>`;
    }
    if (m.loading) {
      return `<div class="message assistant loading">思考中</div>`;
    }
    let html = `<div class="message assistant">${escapeHtml(m.content)}`;
    if (m.sources && m.sources.length) {
      html += `<div class="sources">📚 引用资料: ${m.sources.map(s => `<span class="source-tag">${escapeHtml(s.filename)}</span>`).join(' ')}</div>`;
    }
    html += '</div>';
    return html;
  }).join('');
  
  el.scrollTop = el.scrollHeight;
}

// ─── Modal (Add Node) ───
function showAddModal() {
  document.getElementById('modalTitle').textContent = state.selectedNode
    ? `在 "${state.selectedNode.name}" 下新建`
    : '新建一级学科';
  document.getElementById('modalName').value = '';
  document.getElementById('modalDesc').value = '';
  document.getElementById('modalType').value = 'category';
  document.getElementById('addModal').classList.add('show');
}

function closeModal() {
  document.getElementById('addModal').classList.remove('show');
}

async function confirmAddNode() {
  const name = document.getElementById('modalName').value.trim();
  const type = document.getElementById('modalType').value;
  const desc = document.getElementById('modalDesc').value.trim();
  
  if (!name) return showToast('请输入名称', 'error');
  
  try {
    const form = new FormData();
    form.append('name', name);
    form.append('node_type', type);
    form.append('description', desc);
    if (state.selectedNode) form.append('parent_id', state.selectedNode.id);
    
    await api('POST', '/nodes', form, true);
    showToast('创建成功！', 'success');
    closeModal();
    await loadTree();
  } catch(e) {
    showToast('创建失败: ' + e.message, 'error');
  }
}

// ─── Delete Node ───
async function deleteNode(id, name) {
  if (!confirm(`删除 "${name}" 及其所有子节点和资料？\n此操作不可恢复！`)) return;
  try {
    await api('DELETE', `/nodes/${id}`);
    showToast('已删除', 'success');
    if (state.selectedNode && state.selectedNode.id === id) {
      state.selectedNode = null;
    }
    await loadTree();
    if (!state.selectedNode) {
      document.getElementById('content').innerHTML = `
        <div class="empty-state">
          <div class="big-icon">📚</div>
          <h3>选择一个学科开始</h3>
          <p>在左侧目录中选择一个节点，查看资料、上传文档、或提问</p>
        </div>`;
    }
  } catch(e) {
    showToast('删除失败: ' + e.message, 'error');
  }
}

// ─── Toast ───
function showToast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + type + ' show';
  clearTimeout(el._hide);
  el._hide = setTimeout(() => el.classList.remove('show'), 3000);
}

// ─── Utils ───
function escapeHtml(s) {
  if (!s) return '';
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}
